      - "VaR/CVaR"
      - "仓位缩放"
      - "回撤控制"
    trigger_keywords:
      - "仓位"
      - "风险"
      - "杠杆"
      - "回撤"

  ADVISOR-EE:
    name: "执行工程顾问"
    rating: "A"
