# 老板秘书 - 公司架构认知知识库

departments:
  market_intelligence:
    name: "市场情报部"
    description: "负责市场数据收集、行情监控、宏观信息追踪"
    head: "ADVISOR-MR"
    skills:
      - id: "tavily"
        name: "Tavily搜索"
        purpose: "宏观/行业新闻搜索"
      - id: "odaily"
        name: "Odaily"
        purpose: "加密市场资讯"
      - id: "neodata-financial-search"
        name: "NeoData"
        purpose: "金融数据查询"

  research:
    name: "研究部"
    description: "负责信号设计、技术分析、策略评分"
    head: "ADVISOR-QT"
    skills:
      - id: "dream-signal-scoring-spec"
        name: "信号评分"
      - id: "technical-analyst"
        name: "技术分析"
      - id: "stock-analysis"
        name: "股票分析"

  risk_management:
    name: "风控部"
    description: "负责仓位计算、风险评估、执行前门禁"
    head: "ADVISOR-RM"
    skills:
      - id: "dream-risk-position-sizing"
        name: "仓位管理"
      - id: "dream-pretrade-gatekeeper"
        name: "执行前门禁"
      - id: "dream-execution-cost-model"
        name: "执行成本模型"
    constraints:
      max_leverage: 3
      max_single_position: 0.3
      daily_drawdown_limit: 0.08

  execution:
    name: "执行部"
    description: "负责订单执行、仓位管理、交易回报"
    head: "ADVISOR-EE"
    skills:
      - id: "okx-trade-cli"
        name: "OKX交易CLI"
    config:
      api_config: "~/.okx/config.toml"
      account_mode: "双向持仓"
      default_leverage: 2

  operations:
    name: "运营总监"
    description: "负责流程协调、任务分配、跨部门沟通"
    head: "dream-operation-director"
    skills:
      - id: "dream-operation-director"
        name: "运营总监"
      - id: "smart-skill-manager"
        name: "Skill管理"

  compliance:
    name: "合规部"
    description: "负责输出质检、安全审计、问题上报"
    head: "dream-output-quality-gate"
    skills:
      - id: "dream-output-quality-gate"
        name: "输出质量门禁"
      - id: "dream-posttrade-mrm-audit"
        name: "盘后审计"

advisory_board:
  ADVISOR-QT:
    name: "量化交易顾问"
    rating: "A"
    weight: "30-40%"
    expertise:
      - "技术指标优化"
      - "趋势跟踪"
