  distill:
    name: "蒸馏部"
    description: "负责人才评估、淘汰决策、深度蒸馏、经验提炼与入职。将退役Skill/顾问的核心价值提取为可复用知识，通过双脑协同+状态机治理实现大师级能力包的标准化生产"
    head: "master-distillation-orchestrator"
    skills:
      # 蒸馏核心流水线
      - id: "master-distillation-orchestrator"
        name: "大师蒸馏编排器"
        purpose: "调度单大师蒸馏全流程 (认知建模→推演→门禁→发布)"
        role: "部门负责人"
      - id: "master-factory-orchestrator"
        name: "大师蒸馏工厂"
        purpose: "批量蒸馏1-3位大师的统一流水线"
        role: "批量处理"
      - id: "neuro-cognitive-modeler"
        name: "神经认知建模器"
        purpose: "将大师方法拆解为左脑/右脑/元认知三维认知结构"
      - id: "market-practice-simulator"
        name: "市场实践模拟器"
        purpose: "将认知模型转为可执行playbook，多情景推演"
      - id: "distillation-quality-gate"
        name: "蒸馏质量门禁"
        purpose: "发布前最终审核 (契约/证据/风险/回滚四层检查)"
        role: "质量把关"
      - id: "master-template-registry"
        name: "大师模板注册表"
        purpose: "标准化大师输入模板 (资料/案例/风格权重)"
      # 双脑协同决策
      - id: "shared-memory-kernel"
        name: "共享记忆内核"
        purpose: "统一双脑证据图谱与记忆上下文包"
      - id: "left-brain-executor"
        name: "左脑执行器"
        purpose: "确定性规则、门禁与风险硬约束校验"
      - id: "right-brain-strategist"
        name: "右脑策略师"
        purpose: "情景推演、概率判断、策略温度输出"
      # 状态机治理
      - id: "master-state-machine-governor"
        name: "大师状态机治理"
        purpose: "5态迁移 (observe/candidate/primary/degraded/frozen)"
      - id: "master-regime-fit-scorer"
        name: "大师拟合评分器"
        purpose: "统一计算多大师的regime_fit_score及分解项"
      - id: "master-switch-policy-engine"
        name: "大师切换策略引擎"
        purpose: "生成多大师切换方案 (目标主用/候选/权重)"
      - id: "master-freeze-controller"
        name: "大师冻结控制器"
        purpose: "冻结/解冻流程治理 (触发/审批/回放前置)"
      # 记忆治理
      - id: "memory-governance-evaluator"
        name: "记忆治理评估器"
        purpose: "评估记忆价值/老化/冲突密度"
      - id: "memory-tier-manager"
        name: "记忆分层管理器"
        purpose: "L0/L1/L2分层晋升降级"
      - id: "memory-revalidation-gate"
        name: "记忆重验证门禁"
        purpose: "对过时/冲突记忆触发重验证"
    skill_path: "~/.workbuddy/skills/dream-distill-department/"
    scripts_path: "~/.workbuddy/skills/dream-distill-department/master-factory-orchestrator/scripts/"
    reports_path: "~/.workbuddy/skills/dream-distill-department/master-factory-orchestrator/reports/"
    triggers:
      - "SKILL_RETIRE"
      - "ADVISOR_RETIRE"
      - "KNOWLEDGE_DISTILL"
      - "TALENT_SCREEN"
      - "MASTER_DISTILL"
      - "MASTER_STATE_QUERY"
    upstream:
      - "绩效考核部 (D级Skill/顾问 → 评估 → 移交)"
      - "HR招聘部 (退役Skill → 交接 → 蒸馏)"
    downstream:
      - "HR招聘部 (蒸馏产物 → SOP-4继承入职)"
      - "培训部 (蒸馏规则 → 经验库)"
      - "风控部 (大师playbook → 仓位/门禁参考)"
    principles:
      - "Fail-Closed: 信息不足即拒绝发布，不得猜测补齐"
      - "左脑优先: 左脑硬约束 > 右脑机会判断"
      - "证据可追溯: 每条规则必须有evidence_refs"
      - "5态状态机: frozen解锁仅允许回到observe"

# ============================================================
# v4.0 战略交易体系 - 核心骨干架构 (2026-04-20)
# 基于第一性原理：阻力最小路径 + 趋势延续性
# ============================================================
  strategic_trading:
    name: "战略交易部"
    description: "基于第一性原理的战略交易闭环体系，战术服从战略"
    version: "v1.0"
    principles:
      - "第一性原理: 市场总是沿着阻力最小的方向运行"
      - "趋势延续性: 趋势一旦形成，具有惯性延续"
      - "战略优先: 战术决策必须服从战略框架"
      - "调研前置: 市场+经典战役+金融+情绪"
      - "实事求是: 根据市场变化适度调整"
    
    phases:
      phase_1:
        id: "A1"
        name: "深度调研"
        description: "形成完整的《市场调研报告》"
        trigger: "每周一 09:00 | 战略周期启动时"
        duration: "3-7天"
        outputs:
          - "research_report_YYYYMMDD.md"
          - "market_regime_classification"
          - "historical_cases"
          - "risk_factors"
        modules:
          - name: "市场行情调研"
            source: "OKX行情 + TradingView + 链上数据"
            frequency: "实时"
          - name: "经典战役调研"
            source: "历史类似形态案例库 + 大师交割单"
            frequency: "按需"
          - name: "金融市场调研"
            source: "宏观指标 + ETF流向 + 期货持仓"
            frequency: "每日"
          - name: "市场情绪调研"
            source: "恐惧贪婪 + 资金费率 + 社交媒体"
            frequency: "每日"
        automation: "dream-strategy-research"
        
      phase_2:
        id: "A2"
        name: "第一性原理分析"
        description: "将调研结论锚定到核心理论"
        trigger: "第一步完成后自动触发"
        outputs:
          - "first_principles_analysis_YYYYMMDD.md"
          - "resistance_minimum_direction"
          - "trend_continuation_probability"
          - "key_levels"
        analysis_framework:
          - name: "阻力最小路径识别"
            items:
              - "当前价格位置: 支撑/阻力/中位?"
              - "多周期共振方向: 1H/4H/D1"
              - "关键价位: 谁在买？谁在卖？"
          - name: "趋势延续性评估"
            items:
              - "趋势强度: 强/弱/震荡"
              - "趋势周期: 日内/短期/中期"
              - "趋势衰竭信号: RSI超买/背离/成交量萎缩？"
          - name: "矛盾识别"
            items:
              - "多空逻辑矛盾点"
              - "预期与实际偏差"
              - "可能的反转触发条件"
        automation: "dream-first-principles"
        
      phase_3:
        id: "A3"
        name: "战略制定"
        description: "形成《交易战略方案》"
        trigger: "第二步完成后 | 每日开盘前"
        participants:
          - "战略制定者 (AI)"
          - "顾问团讨论 (13顾问)"
          - "人工确认 (可选)"
        outputs:
          - "strategy_plan_YYYYMMDD.md"
          - "tactical_scenarios.json"
          - "advisor_consultation_record.md"
        strategy_document:
          sections:
            - "战略背景 (调研摘要 + 第一性原理结论 + 市场形态)"
            - "战略框架 (主方向/战略指令/时间框架)"
            - "关键价位 (进场/止损/目标1/目标2)"
            - "战术预案 (情形A/B/C及对应方案)"
            - "仓位策略 (初始仓位/加仓/减仓条件)"
            - "风险预案 (极端情况/流动性/黑天鹅)"
            - "战略有效期 (生效/失效/复核时间)"
        automation: "dream-strategy-designer"
        
      phase_4:
        id: "A4"
        name: "战术验证"
        description: "用小额试探验证战略方向"
        trigger: "战略制定完成后"
        validation_process:
          - name: "触发条件检查"
            desc: "行情是否达到战略入场条件？"
          - name: "仓位计算"
            desc: "验证仓位 = 总仓位 × 10-20%，亏损≤2%账户"
          - name: "执行验证单"
            desc: "小额 SHORT/LONG (1张起)，48小时内必须验证结论"
          - name: "验证结果"
            results:
              - "PASS → 进入第五步"
              - "FAIL → 修订战略或等待"
              - "PENDING → 扩大验证样本"
        outputs:
          - "validation_trade_YYYYMMDD.md"
          - "validation_result: PASS/FAIL/PENDING"
          - "strategy_revision (如需修订)"
        automation: "dream-tactical-validator"
        
      phase_5:
        id: "A5"
        name: "战术实践"
        description: "多工具、多策略实现战略目标"
        trigger: "第四步验证通过"
        execution_dimensions:
          - dimension: "多币种"
            tools: "BTC + ETH + SOL (按战略分配)"
          - dimension: "多工具"
            tools: "永续合约 + 期权 + 现货"
          - dimension: "多策略"
            tools: "趋势跟踪 + 区间震荡 + 突破策略"
          - dimension: "多周期"
            tools: "1H决策 + 4H确认 + D1趋势"
        principles:
          - "仓位总风险 ≤ 战略设定上限"
          - "遵守战略方向，不越界"
          - "定期复核战略有效性"
        automation: "dream-tactical-executor"
        
      phase_6:
        id: "A6"
        name: "情报监控与战术调整"
        description: "实时监控 + 动态调整"
        trigger: "实时监控 + 每日定频复核"
        monitor_items:
          - name: "价格异动"
            threshold: "突破关键位±1%"
            action: "触发战术预案"
          - name: "趋势衰竭"
            threshold: "RSI>80 或 RSI<20"
            action: "考虑减仓"
          - name: "止损预警"
            threshold: "价格距止损<2%"
            action: "提醒关注"
          - name: "战略偏离"
            threshold: "持仓方向与战略冲突"
            action: "告警"
          - name: "市场形态变化"
            threshold: "Regime切换"
            action: "触发战略复核"
        adjustment_mechanism:
          - "轻微波动 → 忽略，继续执行"
          - "中度变化 → 微调止损/目标"
