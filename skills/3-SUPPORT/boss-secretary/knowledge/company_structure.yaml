      - "滑点优化"
      - "执行算法"
    trigger_keywords:
      - "成交"
      - "滑点"
      - "流动性"

  ADVISOR-MR:
    name: "宏观研究顾问"
    rating: "B"
    weight: "20-30%"
    expertise:
      - "利率政策"
      - "地缘风险"
      - "加密市场联动"
    trigger_keywords:
