name: Safe Main Merge Gate

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gate:
    name: PR Gate Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Collect changed files
        run: |
          git fetch origin main --depth=1
          git diff --name-only origin/main...HEAD > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: Run safe main merge gate
        env:
          CHANGED_FILES_PATH: changed_files.txt
        run: |
          python scripts/ci/safe_main_merge_gate.py

      - name: Run architecture sync guard
        env:
          CHANGED_FILES_PATH: changed_files.txt
        run: |
          python scripts/ci/architecture_sync_guard.py

      - name: Run trading system loop gate tests
        run: |
          pytest tests/test_ci_actions_node24_compat.py \
            tests/test_ci_trading_scheduler_workflows_p0.py \
            tests/test_trading_protocol_fail_closed_p0.py \
            tests/test_trading_http_send_envelope_p1.py \
            tests/test_trading_redis_streams_p1.py \
            tests/test_trading_transport_router_p1.py \
            tests/test_trading_transports_p1.py \
            tests/test_trading_demo_http_server_p1.py \
            tests/test_trading_demo_redis_consumer_p1.py \
            tests/test_trading_governance_orchestrator_p1.py \
            tests/test_trading_system_loop_e2e_p1p2.py \
            tests/test_trading_replay_observability_p2.py \
            tests/test_trading_memory_l4_contract_e2e.py \
            tests/test_ci_trading_traceability_guard.py \
            tests/test_ci_branch_lifecycle_bot.py \
            tests/test_ci_evolution_decision_gate.py \
            tests/test_ci_evolution_policy_regression_matrix.py \
            tests/test_ci_evolution_candidate_priority_score.py \
            tests/test_ci_evolution_version_compare_dashboard.py \
            tests/test_ci_constraint_rollback.py \
            tests/test_ci_constraint_release_snapshot.py \
            tests/test_ci_evolution_governance_report.py -q

      - name: Generate trading artifacts for traceability audit
        run: |
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          root = Path.cwd()
          mod_path = root / "workflows" / "trading-decision" / "orchestrator" / "execution_loop.py"
          spec = importlib.util.spec_from_file_location("execution_loop", mod_path)
          module = importlib.util.module_from_spec(spec)
          assert spec and spec.loader
          spec.loader.exec_module(module)

          payload = {
              "trace_id": "trace-ci-traceability-1",
              "signals": ["macro"],
              "confidence": 0.8,
              "rsi": 52,
              "funding_rate": 0.0,
              "fgi": 55,
              "signal_score": 62,
              "volatility": 0.02,
              "market_regime": "trend",
              "max_drawdown_pct": 1.2,
              "position_ratio": 0.25,
              "stop_loss_pct": 1.5,
              "direction": "LONG",
              "entry_price": 65000,
              "leverage": 2,
              "unrealized_pnl_pct": 1.0,
              "risk_level": "low",
          }
          out = module.run_execution_loop(payload, output_dir=root / "artifacts" / "trading")
          print("Generated trace:", out["trace_id"])
          PY

      - name: Run trading traceability guard
        run: |
          python scripts/ci/trading_traceability_guard.py --artifacts-dir artifacts/trading --min-files 1

      - name: Run review policy guard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER_LOGIN: yunya1991
        run: |
          python scripts/ci/review_policy_guard.py
