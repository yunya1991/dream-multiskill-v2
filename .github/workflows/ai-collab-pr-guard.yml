name: AI Collab PR Guard

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited
      - labeled

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guard:
    name: AI Collab Guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Collect changed files
        run: |
          git fetch origin main --depth=1
          git diff --name-only origin/main...HEAD > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: Run ai-collab guard (fail-closed)
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          export CHANGED_FILES="$(cat changed_files.txt)"
          python scripts/ci/ai_collab_guard.py \
            --repo "${{ github.repository }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --policy-file ".github/ai-collab-policy.yml" \
            --out-dir "artifacts/ai_collab"

      - name: Upload guard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-collab-guard-${{ github.run_id }}
          path: |
            artifacts/ai_collab/
            changed_files.txt
          if-no-files-found: error

