name: Evolution Decision Gate

on:
  workflow_dispatch:
    inputs:
      candidate_path:
        description: "Candidate JSON path"
        required: false
        default: "artifacts/evolution/feedback/candidate_positive_20260511.json"
      report_paths:
        description: "Comma-separated ValidationReport JSON paths"
        required: false
        default: "artifacts/evolution/audit/audit_positive_20260511.json,artifacts/evolution/sandbox/sandbox_positive_20260511.json,artifacts/evolution/stress/stress_positive_20260512.json,artifacts/evolution/scenario/scenario_positive_20260512.json,artifacts/evolution/backtest/backtest_positive_20260512.json"
      to_version:
        description: "Target constraint version"
        required: false
        default: "v0.1.1"
      required_stages:
        description: "Comma-separated stage list"
        required: false
        default: "audit,sandbox,stress,scenario,backtest"
      stage_policy_json:
        description: "Optional stage policy JSON path"
        required: false
        default: ""
      policy_version:
        description: "Policy template version (uses policy library)"
        required: false
        default: ""
      policy_library_dir:
        description: "Policy library directory"
        required: false
        default: "artifacts/evolution/policy/templates"
      approval_ticket_json:
        description: "Approval ticket JSON path"
        required: false
        default: "artifacts/evolution/approval/approval_ticket_positive_20260511.json"
      require_approval_ticket:
        description: "Require approval ticket"
        required: false
        default: "true"
      run_regression_matrix:
        description: "Run policy regression matrix"
        required: false
        default: "false"
      regression_matrix_json:
        description: "Regression matrix JSON path"
        required: false
        default: "artifacts/evolution/policy/regression-matrix-p1-5-v1.json"
      dry_run:
        description: "Do not write artifacts"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  decision-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run evolution decision gate
        run: |
          CANDIDATE_PATH="${{ github.event.inputs.candidate_path || 'artifacts/evolution/feedback/candidate_positive_20260511.json' }}"
          REPORT_PATHS="${{ github.event.inputs.report_paths || 'artifacts/evolution/audit/audit_positive_20260511.json,artifacts/evolution/sandbox/sandbox_positive_20260511.json,artifacts/evolution/stress/stress_positive_20260512.json,artifacts/evolution/scenario/scenario_positive_20260512.json,artifacts/evolution/backtest/backtest_positive_20260512.json' }}"
          TO_VERSION="${{ github.event.inputs.to_version || 'v0.1.1' }}"
          REQUIRED_STAGES="${{ github.event.inputs.required_stages || 'audit,sandbox,stress,scenario,backtest' }}"
          STAGE_POLICY_JSON="${{ github.event.inputs.stage_policy_json || '' }}"
          POLICY_VERSION="${{ github.event.inputs.policy_version || '' }}"
          POLICY_LIBRARY_DIR="${{ github.event.inputs.policy_library_dir || 'artifacts/evolution/policy/templates' }}"
          APPROVAL_TICKET_JSON="${{ github.event.inputs.approval_ticket_json || 'artifacts/evolution/approval/approval_ticket_positive_20260511.json' }}"
          REQUIRE_APPROVAL_TICKET="${{ github.event.inputs.require_approval_ticket || 'true' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          POLICY_ARGS=()
          if [ -n "$POLICY_VERSION" ]; then
            POLICY_ARGS+=(--policy-version "$POLICY_VERSION")
            POLICY_ARGS+=(--policy-library-dir "$POLICY_LIBRARY_DIR")
          fi
          if [ -n "$STAGE_POLICY_JSON" ]; then
            POLICY_ARGS+=(--stage-policy-json "$STAGE_POLICY_JSON")
          fi
          if [ "$REQUIRE_APPROVAL_TICKET" = "true" ]; then
            POLICY_ARGS+=(--require-approval-ticket)
          fi
          if [ -n "$APPROVAL_TICKET_JSON" ]; then
            POLICY_ARGS+=(--approval-ticket-json "$APPROVAL_TICKET_JSON")
          fi

          if [ "$DRY_RUN" = "true" ]; then
            python scripts/ci/evolution_decision_gate.py \
              --candidate "$CANDIDATE_PATH" \
              --reports "$REPORT_PATHS" \
              --required-stages "$REQUIRED_STAGES" \
              --to-version "$TO_VERSION" \
              "${POLICY_ARGS[@]}" \
              --dry-run
          else
            python scripts/ci/evolution_decision_gate.py \
              --candidate "$CANDIDATE_PATH" \
              --reports "$REPORT_PATHS" \
              --required-stages "$REQUIRED_STAGES" \
              --to-version "$TO_VERSION" \
              "${POLICY_ARGS[@]}" \
              --artifacts-dir artifacts/evolution/decision \
              --rollback-dir artifacts/evolution/rollback \
              --approval-artifacts-dir artifacts/evolution/approval
          fi

      - name: Run policy regression matrix
        if: ${{ github.event.inputs.run_regression_matrix == 'true' }}
        run: |
          MATRIX_JSON="${{ github.event.inputs.regression_matrix_json || 'artifacts/evolution/policy/regression-matrix-p1-5-v1.json' }}"
          python scripts/ci/evolution_policy_regression_matrix.py \
            --matrix-json "$MATRIX_JSON" \
            --output-json artifacts/evolution/policy/regression-matrix-summary-${{ github.run_id }}.json

      - name: Upload decision artifacts
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: evolution-decision-gate-${{ github.run_id }}
          path: |
            artifacts/evolution/decision/*.json
            artifacts/evolution/rollback/*.json
            artifacts/evolution/approval/*.json
            artifacts/evolution/policy/regression-matrix-summary-${{ github.run_id }}.json
          if-no-files-found: error
